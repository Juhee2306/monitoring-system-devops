
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: 'flask-app'
    static_configs:
      - targets: ['flask-app:5000']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
