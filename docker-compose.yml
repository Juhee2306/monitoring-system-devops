version: '3.8'

services:

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=lavanyajuhee@gmail.com
      - GF_SMTP_PASSWORD=gbjr sipe txlr myge
      - GF_SMTP_FROM_ADDRESS=lavanyajuhee@gmail.com
  flask-app:
    build: ./flask-app
    ports:
      - "5000:5000"


volumes:
  grafana-data:
    external: true
    name: monitoring-project_grafana-data

